services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: store_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend_net
    restart: always

  api:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://admin:secretpassword@db:5432/store_db
    depends_on:
      - db
    networks:
      - backend_net
      - frontend_net
    restart: always

  frontend:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - api
    networks:
      - frontend_net
    restart: always

networks:
  backend_net:
    driver: bridge
  frontend_net:
    driver: bridge

volumes:
  pgdata: