<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Tienda Local</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Gestión de Artículos</h1>
        
        <div class="form-container">
            <form id="articleForm">
                <input type="hidden" id="articleId">
                
                <label for="name">Nombre:</label>
                <input type="text" id="name" required>
                
                <label for="price">Precio:</label>
                <input type="number" id="price" step="0.01" required>
                
                <label for="description">Descripción:</label>
                <input type="text" id="description">
                
                <label for="stock">Stock:</label>
                <input type="number" id="stock" value="0">
                
                <button type="submit" id="submitBtn">Guardar Artículo</button>
                <button type="button" id="cancelBtn" class="btn-cancel" style="display: none;">Cancelar</button>
            </form>
        </div>

        <table id="articlesTable">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Precio</th>
                    <th>Descripción</th>
                    <th>Stock</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>

    <script src="app.js"></script>
</body>
</html>
